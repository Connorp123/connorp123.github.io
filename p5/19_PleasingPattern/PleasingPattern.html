<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pleasing Pattern</title>

  <script src="../libraries/p5.js" language="javascript"></script>
  <script src="../libraries/p5.dom.js" language="javascript"></script>
  <script src="../libraries/p5.sound.js" language="javascript" ></script>
  <script src="vehicle.js" type="text/javascript"></script>
  <script src="sketch.js" type="text/javascript"></script>

  <style> body {padding: 0; margin: 0;} canvas {vertical-align: top;} </style>
</head>
<body>
  <div id='canvas'></div>
  <div id="textInput1"></div>
  <div id="fontButton"></div>
  <div id="displayModeButton"></div>
  <p>Controls:</p>
  <p>C     - Toggle colorful particles</p>
  <p>B     - Toggle background redraw</p>
  <p>P     - Pause/Play</p>
  <p>UP    - Increase stroke</p>
  <p>DOWN  - Decrease stroke</p>
  <p>SPACE - Toggle Debug</p>
  <p>RIGHT - Increase rotation speed</p>
  <p>LEFT  - Decrease rotation speed</p>
</body>
</html>
