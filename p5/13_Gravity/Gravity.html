<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Planetary Gravitation</title>

  <script src="../libraries/p5.js" type="text/javascript"></script>
  <script src="../libraries/p5.dom.js" type="text/javascript"></script>
  <!--<script src="../libraries/p5.sound.js" type="text/javascript"></script>-->

  <script src="planet.js" type="text/javascript"></script>
  <script src="sketch.js" type="text/javascript"></script>

  <style> body {padding: 0; margin: 0;} canvas {vertical-align: top;} </style>
</head>
<body>
  <p>Mass of planet 1</p>
  <div id="m1Input"></div>

  <p>Mass of planet 2</p>
  <div id="m2Input"></div>

  <p>Mass of the new planet (spawned with N)</p>
  <div id="mInput"></div>
  <div id='canvas'></div>
  <p>Controls:</p>
  <p>G - Toggle gravity</p>
  <p>C - Clear all planets</p>
  <p>B - Toggle backgroud redraw</p>
  <p>N - Spawn new planet</p>
  <p>R - Reset</p>
  <p>D - Toggle debug</p>
</body>
</html>
