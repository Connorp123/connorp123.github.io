<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Image Fun</title>

  <script src="../libraries/p5.js" type="text/javascript"></script>
  <!--<script src="../libraries/p5.dom.js" type="text/javascript"></script>-->
  <!--<script src="../libraries/p5.sound.js" type="text/javascript"></script>-->

  <script src="vehicle.js" type="text/javascript"></script>
  <script src="flowfield.js" type="text/javascript"></script>
  <script src="sketch.js" type="text/javascript"></script>

  <style> body {padding: 0; margin: 0;} canvas {vertical-align: top;} </style>
</head>
<body>
  <div id='canvas'></div>
  <p>Controls:</p>
  <p>Drag to spawn new balls</p>
  <p>C - Clear all balls</p>
  <p>F - Toggle flow field</p>
  <p>A - Toggle attraction to the mouse</p>
  <p>S - Toggle separation of the balls</p>
  <p>B - Toggle background re-draw</p>
  <p>SPACE - Toggle debug mode</p>
</body>
</html>
